{% load i18n static %}

{% include "umap/components/alerts/alert.html" %}
{% for message in messages %}
  <script type="module">
    import { Alert } from "{% static 'umap/js/components/alerts/alert.js' %}"
    {% if message.level == DEFAULT_MESSAGE_LEVELS.ERROR %}
      Alert.error("{{ message }}")
    {% else %}
      Alert.success("{{ message }}")
    {% endif %}
  </script>
{% endfor %}
